name: Performance

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write
  pull-requests: write

jobs:
  bench:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile Odin vendor libraries
        run: |
          make -C /home/runner/odin/vendor/stb/src
          make -C /home/runner/odin/vendor/cgltf/src

      - name: Setup Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.321.1
          cache: true

      - name: Build shaders
        run: make shader

      - name: Build benchmark binary
        run: odin build benchmark -out:bin/bench -o:speed -no-bounds-check

      - name: Pin CPU and run benchmark
        run: |
          mkdir -p artifacts
          # Pin to two cores for less noise; run twice and keep median by aggregator.
          taskset -c 0,1 ./bin/bench --out=artifacts/bench-run1.json
          taskset -c 0,1 ./bin/bench --out=artifacts/bench-run2.json

      - name: Aggregate
        run: |
          python3 benchmark/aggregate.py \
            artifacts/bench-run1.json artifacts/bench-run2.json \
            --smaller-out=artifacts/bench-smaller.json \
            --bigger-out=artifacts/bench-bigger.json \
            --context-out=artifacts/bench-context.json

      - name: Upload raw artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-artifacts
          path: artifacts

      # Latency / time metrics — smaller is better
      - name: Track latency metrics
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Mjolnir latency
          tool: customSmallerIsBetter
          output-file-path: artifacts/bench-smaller.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/latency
          # Only push history on master commits.
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          # Comment on PRs and fail if regression > 25%.
          comment-on-alert: true
          alert-threshold: '125%'
          fail-on-alert: ${{ github.event_name == 'pull_request' }}
          summary-always: true

      # Throughput metrics — bigger is better
      - name: Track throughput metrics
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Mjolnir throughput
          tool: customBiggerIsBetter
          output-file-path: artifacts/bench-bigger.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/throughput
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          comment-on-alert: true
          # 80% of baseline counts as regression on a "bigger" metric.
          alert-threshold: '80%'
          fail-on-alert: ${{ github.event_name == 'pull_request' }}
          summary-always: true
