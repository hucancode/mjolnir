name: Performance

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-24.04
    env:
      VK_DRIVER_FILES: /usr/share/vulkan/icd.d/lvp_icd.json
    steps:
      - uses: actions/checkout@v4

      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile Odin vendor libraries
        run: |
          make -C /home/runner/odin/vendor/stb/src
          make -C /home/runner/odin/vendor/cgltf/src

      - name: Setup Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.321.1
          cache: true

      - name: Install runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb libglfw3 mesa-vulkan-drivers vulkan-tools \
            build-essential pkg-config libpng-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libglfw.so.3 /usr/lib/x86_64-linux-gnu/libglfw.so

      - name: Build shaders
        run: make shader

      - name: Pin CPU governor (best effort, noise reduction)
        run: |
          echo performance | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor || true

      - name: Build benchmark binary
        run: odin build ./benchmark -out:bin/bench -o:speed -no-bounds-check

      - name: Run benchmarks
        run: |
          mkdir -p artifacts
          taskset -c 0,1 ./bin/bench --out=artifacts/bench.json

      - name: Summarize results
        run: |
          {
            echo '## Benchmark results'
            echo
            echo "commit: \`${GITHUB_SHA}\`"
            echo
            echo '| metric | unit | value | extra |'
            echo '| --- | --- | --- | --- |'
            jq -r '.[] | "| \(.name) | \(.unit) | \(.value) | \(.extra) |"' artifacts/bench.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bench artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ github.sha }}
          path: artifacts/bench.json
          retention-days: 30
